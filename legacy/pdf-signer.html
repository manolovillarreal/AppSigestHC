<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firmar PDF con Imagen</title>
  <link rel="stylesheet" href="pdf-signer.css">
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
</head>
<body>
  <div id="upload-area">
    <h2>Firmar PDF</h2>
    <div class="upload-box">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
      <p>Arrastra y suelta un archivo PDF aquí</p>
      <p class="upload-or">o</p>
      <label for="pdf-upload" class="custom-file-upload">
        Seleccionar archivo
      </label>
      <input type="file" id="pdf-upload" accept="application/pdf">
    </div>
  </div>

  <div id="main-container">
    <div id="pages-panel">
      <h3>Páginas</h3>
      <div id="pages-list"></div>
    </div>

    <div id="pdf-viewer-container">
      <div id="pdf-toolbar">
        <button id="reset-document-btn" class="btn btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"></polyline>
            <polyline points="23 20 23 14 17 14"></polyline>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
          </svg>
          Firmar otro documento
        </button>
        <button id="add-signature-btn" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"></path>
          </svg>
          Agregar Firma
        </button>
        <div class="page-controls">
          <button id="prev-page" class="btn btn-secondary">‹</button>
          <span id="page-info"></span>
          <button id="next-page" class="btn btn-secondary">›</button>
        </div>
      </div>
      <div class="pdf-viewer">
        <canvas id="pdf-canvas"></canvas>
      </div>
    </div>

    <div id="firmas-panel">
      <h3>Firmas</h3>
      <div id="firmas-list"></div>
      <button id="download" class="btn btn-success">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Descargar PDF Firmado
      </button>
    </div>
  </div>

  <div id="signature-modal">
    <div class="signature-modal-content">
      <h2>Crear firma</h2>
      <div class="signature-canvas-container">
        <canvas id="signature-fullscreen"></canvas>
        <div class="signature-guide"></div>
      </div>
      <p class="signature-hint">Firma dentro del rectángulo sugerido</p>
      <div class="modal-actions">
        <button id="clear-signature" class="btn btn-secondary">Limpiar</button>
        <button id="cancel-signature" class="btn btn-danger">Cancelar</button>
        <button id="accept-signature" class="btn btn-success">Aceptar</button>
      </div>
    </div>
  </div>

  <div id="positioning-controls">
    <div class="positioning-controls-content">
      <p>Haz clic en el documento para posicionar la firma</p>
      <label>
        Tamaño: 
        <input type="range" id="sizeRange" min="50" max="600" value="150">
      </label>
      <div class="modal-actions">
        <button id="cancel-position" class="btn btn-danger">Cancelar</button>
        <button id="confirm-position" class="btn btn-success">Confirmar</button>
      </div>
    </div>
  </div>

  <div style="display:none;">
    <video id="video" width="320" height="240" autoplay></video>
    <canvas id="photo" width="320" height="240"></canvas>
    <button id="take-photo">Tomar Foto</button>
    <button id="reset-photo">Restablecer</button>
  </div>

  <script src="pdf-signer.js"></script>
</body>
</html>
