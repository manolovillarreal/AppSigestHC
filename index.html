<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIGEST HC</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/estilos.css" />
    <link rel="stylesheet" href="css/atencion/atencionView.css" />
    <link rel="stylesheet" href="css/documentos/documentos.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/pdf/firmaPdf.css" />
    <link rel="stylesheet" href="css/solicitudCorreccion/correcciones.css" />
    <link rel="stylesheet" href="css/atencion/buscarAtenciones.css" />
    <link rel="stylesheet" href="css/home/home.css" />
    <!-- CSS de SweetAlert2 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <!-- Script de SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- PDF.js para visualización de PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
      // Configurar ruta del worker de PDF.js
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    </script>
    <!-- PDF-lib para manipulación de PDFs (firmas) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <!-- SignaturePad para capturar firmas -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad"></script>
    <!-- JSZip para crear archivos ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>


    <script type="module" src="src/main.js" defer></script>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <!-- Logo -->
          <div class="sidebar-logo">
            <img src="img/Logo.png" alt="SIGEST HC" style="height: 70px; width: auto; display: block;" />
          </div>
          <hr class="sidebar-divider">

          <div class="usuario-info-container">
            <div class="usuario-info">
              <div class="avatar-circular-pequeno">
                <span class="material-icons" style="font-size: 20px;">person</span>
              </div>
              <span id="nombreUsuario" class="usuario-nombre">Usuario</span>
            </div>
            <button id="btnLogout" class="btn-icon btn-logout" title="Cerrar sesión">
              <span class="material-icons" style="font-size: 16px;">arrow_forward</span>
            </button>
          </div>
          <div id="menuHeader" class="menu-navegacion nav-centered">
          </div>
        </div>     
        <div id="sidebar-panel"></div>
      </aside>

      <main class="main-content">
        <h1>Bienvenido, <span id="nombreCompletoUsuario">Usuario</span></h1>
        <div id="main-content-panel">
        
        </div>
      </main>
    </div>
   
  </body>
</html>
